# fly.toml app configuration file generated for ali-kinobot on 2026-05-16T06:25:32Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ali-kinobot'
primary_region = 'fra'

[build]

[deploy]
  strategy = 'immediate'

[env]
  PORT = '8080'
  PYTHONUNBUFFERED = '1'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
